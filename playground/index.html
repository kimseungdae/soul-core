<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Soul Core 플레이그라운드</title>
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <div id="app">
      <header>
        <h1>Soul Core 플레이그라운드</h1>
        <span class="subtitle">NPC 인격 시뮬레이션 런타임</span>
        <div style="margin-left: auto; display: flex; gap: 8px">
          <button id="tab-manual" class="tab-btn active">수동 모드</button>
          <button id="tab-scenario" class="tab-btn">시나리오 모드</button>
          <button id="tab-world" class="tab-btn">월드 모드</button>
        </div>
      </header>

      <div class="layout">
        <!-- Left: Controls -->
        <section class="panel controls">
          <h2>인격</h2>
          <div class="persona-select">
            <button class="persona-btn active" data-persona="warrior">
              카엘 (전사)
            </button>
            <button class="persona-btn" data-persona="scholar">
              리라 (학자)
            </button>
            <button class="persona-btn" data-persona="rogue">
              벡스 (도적)
            </button>
          </div>
          <div id="persona-info" class="info-box"></div>

          <!-- Manual Mode Controls -->
          <div id="manual-controls">
            <h2>이벤트</h2>
            <div class="event-controls">
              <select id="event-category">
                <option value="social">사회적</option>
                <option value="combat">전투</option>
                <option value="cognitive">인지</option>
                <option value="moral">도덕</option>
              </select>
              <select id="event-action">
                <option value="insulted_by">모욕당함</option>
              </select>
              <div class="row">
                <label
                  >출처: <input type="text" id="event-source" value="npc-enemy"
                /></label>
                <label
                  >심각도:
                  <input
                    type="range"
                    id="event-severity"
                    min="0"
                    max="1"
                    step="0.1"
                    value="0.7"
                  />
                  <span id="severity-val">0.7</span>
                </label>
              </div>
              <div class="row">
                <label
                  ><input type="checkbox" id="safe-zone" /> 안전 구역</label
                >
              </div>
              <button id="send-event" class="primary-btn">
                이벤트 전송 (틱 +1)
              </button>
              <button id="idle-tick" class="secondary-btn">
                대기 틱 (이벤트 없음)
              </button>
              <button id="reset-btn" class="danger-btn">인격 초기화</button>
            </div>
          </div>

          <!-- Scenario Mode Controls -->
          <div id="scenario-controls" style="display: none">
            <h2>시나리오</h2>
            <div class="event-controls">
              <select id="scenario-select">
                <option value="daily_life">일상 생활 (하루)</option>
                <option value="betrayal_arc">배신 시나리오</option>
                <option value="adventure">모험 시나리오</option>
              </select>
              <div id="scenario-desc" class="info-box" style="margin-top: 8px">
                시나리오를 선택하세요
              </div>
              <div class="row">
                <label
                  >속도:
                  <input
                    type="range"
                    id="scenario-speed"
                    min="500"
                    max="3000"
                    step="250"
                    value="1500"
                  />
                  <span id="speed-val">1.5초</span>
                </label>
              </div>
              <button id="scenario-start" class="primary-btn">
                시나리오 시작
              </button>
              <button
                id="scenario-pause"
                class="secondary-btn"
                style="display: none"
              >
                일시정지
              </button>
              <button
                id="scenario-stop"
                class="danger-btn"
                style="display: none"
              >
                중단
              </button>
            </div>
          </div>
        </section>

        <!-- Center: Response & Timeline -->
        <section class="panel main">
          <h2>응답 <span id="tick-display" class="tick-badge">틱: 0</span></h2>

          <!-- Avatar Canvas -->
          <div class="avatar-container">
            <canvas id="avatar-canvas" width="200" height="200"></canvas>
          </div>

          <!-- Scenario narration -->
          <div
            id="scenario-narration"
            class="narration-box"
            style="display: none"
          ></div>

          <div id="action-display" class="action-box">
            <div class="placeholder">이벤트를 전송하면 응답이 표시됩니다</div>
          </div>

          <h2>결정 추적</h2>
          <div id="trace-display" class="trace-box">
            <div class="placeholder">-</div>
          </div>

          <h2>타임라인</h2>
          <div id="timeline" class="timeline"></div>
        </section>

        <!-- Right: State -->
        <section class="panel state">
          <h2>내면 상태</h2>

          <h3>감정</h3>
          <div id="emotions-display" class="state-section"></div>

          <h3>기분</h3>
          <div id="mood-display" class="state-section"></div>

          <h3>욕구</h3>
          <div id="needs-display" class="state-section"></div>

          <h3>관계</h3>
          <div id="relationships-display" class="state-section"></div>

          <h3>기억</h3>
          <div id="memories-display" class="state-section"></div>
        </section>
      </div>

      <!-- World Mode (hidden by default) -->
      <div id="world-view" class="world-layout" style="display: none">
        <!-- Left: NPC List & Controls -->
        <section class="panel world-sidebar">
          <h2>시뮬레이션</h2>
          <div class="world-controls">
            <div class="world-time-display">
              <span id="world-day">1일차</span>
              <span id="world-time">06:00</span>
              <span id="world-period" class="tick-badge">오전</span>
            </div>
            <div class="world-speed-row">
              <label
                >속도:
                <input
                  type="range"
                  id="world-speed"
                  min="200"
                  max="3000"
                  step="100"
                  value="1500"
                />
                <span id="world-speed-val">1.5초</span>
              </label>
            </div>
            <div style="display: flex; gap: 6px">
              <button id="world-start" class="primary-btn" style="flex: 1">
                시작
              </button>
              <button
                id="world-pause"
                class="secondary-btn"
                style="flex: 1; display: none"
              >
                일시정지
              </button>
            </div>
            <button id="world-reset" class="danger-btn">월드 초기화</button>
          </div>

          <h2>주민 <span id="world-npc-count" class="tick-badge">8</span></h2>
          <div id="world-npc-list" class="npc-list"></div>
        </section>

        <!-- Center: Tile Map Canvas -->
        <section class="panel world-map-panel">
          <canvas id="world-canvas"></canvas>
          <div id="world-info-bar" class="world-info-bar">
            WASD/화살표: 이동 | 클릭: NPC 선택 | 스크롤: 확대/축소
          </div>
        </section>

        <!-- Right: Selected NPC State & Event Log -->
        <section class="panel world-state-panel">
          <h2>
            선택된 NPC
            <span id="world-selected-name" class="tick-badge">없음</span>
          </h2>
          <div id="world-npc-detail" class="info-box">
            NPC를 클릭하여 선택하세요
          </div>

          <h3>감정</h3>
          <div id="world-emotions" class="state-section"></div>

          <h3>욕구</h3>
          <div id="world-needs" class="state-section"></div>

          <h3>관계</h3>
          <div id="world-relationships" class="state-section"></div>

          <h2>이벤트 로그</h2>
          <div id="world-event-log" class="event-log"></div>
        </section>
      </div>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
